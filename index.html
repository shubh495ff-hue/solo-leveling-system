<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solo Leveling: System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="login-screen" class="container">
        <h1 class="neon-text">SYSTEM AWAKENING</h1>
        <p>Enter your name to link with the System</p>
        <input type="text" id="username-input" placeholder="Hunter Name...">
        <button onclick="login()">INITIALIZE</button>
    </div>

    <div id="game-screen" class="container hidden">
        <div class="header">
            <h2 id="display-name">Hunter</h2>
            <p id="player-class">Class: None</p>
        </div>

        <div class="stats-card">
            <img id="rank-card-img" src="rank-e.jpg" alt="Rank Card" class="rank-image">

            <p>RANK: <span id="rank">E-RANK</span></p>
            <p>LEVEL: <span id="level">1</span></p>
            
            <div class="progress-bar">
                <div id="progress-fill"></div>
            </div>
            <p>PROGRESS: <span id="grind-count">0</span> / 10</p>
        </div>

        <button id="grind-btn" class="main-btn">GRIND</button>
        <button onclick="logout()" class="secondary-btn">LOGOUT / RESET</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
